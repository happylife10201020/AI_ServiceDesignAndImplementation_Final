<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 서비스 설계 학습 튜터</title>
  <style>
    :root { --bg:#1e1e24; --panel:#26262e; --line:#3a3a44; --text:#e8e8ea; --muted:#9a9aa5; --user:#2f5d50; --accent:#4a7dff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:820px; margin:0 auto; height:100vh; display:flex; flex-direction:column; padding:16px; }
    header { padding:8px 4px 14px; border-bottom:1px solid var(--line); }
    header h1 { font-size:18px; margin:0; }
    header p { margin:4px 0 0; font-size:13px; color:var(--muted); }
    #log { flex:1; overflow-y:auto; padding:16px 4px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:82%; padding:10px 13px; border-radius:12px; white-space:pre-wrap; line-height:1.5; font-size:14px; }
    .user { align-self:flex-end; background:var(--user); }
    .bot { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
    .meta { align-self:center; color:var(--muted); font-size:12px; }
    form { display:flex; gap:8px; padding-top:12px; border-top:1px solid var(--line); }
    #input { flex:1; background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:14px; }
    #input:focus { outline:none; border-color:var(--accent); }
    button { border:none; border-radius:10px; padding:0 16px; font-size:14px; color:#fff; background:var(--accent); cursor:pointer; }
    button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
    button:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI 서비스 설계 학습 튜터</h1>
      <p>강의자료(LangChain / LangGraph / RAG / Agent)를 근거로 답합니다. 예: "RAG가 뭐야?"</p>
    </header>
    <div id="log">
      <div class="meta">질문을 입력해 시작하세요.</div>
    </div>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="질문을 입력하세요" />
      <button id="send" type="submit">보내기</button>
      <button id="reset" type="button" class="ghost">초기화</button>
    </form>
  </div>

  <script>
    const sessionId = "web-" + Math.random().toString(36).slice(2, 8);
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const resetBtn = document.getElementById("reset");

    function add(role, text) {
      const el = document.createElement("div");
      el.className = "msg " + (role === "user" ? "user" : "bot");
      el.textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    async function send(message) {
      add("user", message);
      const pending = add("bot", "생각 중...");
      sendBtn.disabled = true;
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, sessionId }),
        });
        const data = await res.json();
        pending.textContent = data.success ? data.answer : ("오류: " + data.error);
      } catch (e) {
        pending.textContent = "요청 실패: " + e.message;
      } finally {
        sendBtn.disabled = false;
        log.scrollTop = log.scrollHeight;
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      send(message);
    });

    resetBtn.addEventListener("click", async () => {
      await fetch("/api/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId }),
      });
      log.innerHTML = '<div class="meta">대화를 초기화했습니다.</div>';
    });
  </script>
</body>
</html>
